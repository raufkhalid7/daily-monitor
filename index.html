<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Monitoring Summary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #181b23;
      --surface2: #1f2330;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #eef0f4;
      --muted: #7b8094;
      --green: #22c55e;
      --green-bg: rgba(34,197,94,0.1);
      --green-border: rgba(34,197,94,0.25);
      --red: #ef4444;
      --red-bg: rgba(239,68,68,0.1);
      --red-border: rgba(239,68,68,0.25);
      --amber: #f59e0b;
      --accent: #6366f1;
      --accent-muted: rgba(99,102,241,0.15);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 0;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(15,17,23,0.92);
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--green); }
      50% { opacity: 0.6; box-shadow: 0 0 4px var(--green); }
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .last-checked {
      font-size: 12px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .refresh-btn {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
    }

    .refresh-btn:hover { background: #2a2f3f; }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .refresh-icon {
      width: 14px;
      height: 14px;
      transition: transform 0.6s ease;
    }

    .refresh-btn.spinning .refresh-icon {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    .page-title {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }

    .page-subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 2rem;
    }

    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
    }

    .metric-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .metric-value {
      font-size: 28px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: -0.02em;
    }

    .metric-value.green { color: var(--green); }
    .metric-value.red { color: var(--red); }

    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 10px;
      padding-left: 2px;
    }

    .sites-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .site-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.2s;
    }

    .site-row:hover { border-color: var(--border2); }

    .site-row.ok { border-left: 3px solid var(--green); }
    .site-row.error { border-left: 3px solid var(--red); }
    .site-row.checking { border-left: 3px solid var(--border2); }

    .site-left { display: flex; align-items: center; gap: 12px; }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.ok { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.5); }
    .status-dot.error { background: var(--red); box-shadow: 0 0 6px rgba(239,68,68,0.5); }
    .status-dot.checking {
      background: var(--muted);
      animation: blink 1s ease-in-out infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .site-name {
      font-size: 14px;
      font-weight: 500;
    }

    .site-url {
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 2px;
    }

    .status-badge {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.02em;
    }

    .status-badge.ok { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .status-badge.error { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
    .status-badge.checking { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

    .response-time {
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 2px;
      text-align: right;
    }

    .site-right { text-align: right; }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }

    @media (max-width: 500px) {
      header { padding: 1rem; }
      main { padding: 1.5rem 1rem; }
      .summary-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .metric-value { font-size: 22px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Daily Monitor
  </div>
  <div class="header-right">
    <span class="last-checked" id="last-checked">Not yet checked</span>
    <button class="refresh-btn" id="refresh-btn" onclick="runChecks()">
      <svg class="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
      Refresh
    </button>
  </div>
</header>

<main>
  <h1 class="page-title">Daily Monitoring Summary</h1>
  <p class="page-subtitle" id="page-date">Loading...</p>

  <div class="summary-grid">
    <div class="metric-card">
      <div class="metric-label">Total sites</div>
      <div class="metric-value" id="total-val">9</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Online</div>
      <div class="metric-value green" id="online-val">—</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Offline</div>
      <div class="metric-value red" id="offline-val">—</div>
    </div>
  </div>

  <div class="section-label">Website checks</div>
  <div class="sites-list" id="sites-list"></div>

  <div class="section-label" style="margin-top: 2rem;">Quote form checks</div>
  <div class="sites-list" id="forms-list"></div>
</main>

<footer>
  Auto-checks on load · Refresh anytime · Built for raufkhalid7
</footer>

<script>
const sites = [
  { name: "SiteHQ Website",        url: "https://www.sitehq.com.au/" },
  { name: "1300TF Website",         url: "https://www.temporaryfence.com.au/" },
  { name: "1300Hoarding Website",   url: "https://www.1300hoarding.com.au/" },
  { name: "1300SiteCam Website",    url: "https://www.1300sitecam.com.au/" },
  { name: "1300Dunnys Website",     url: "https://hireportabletoilets.com.au/" },
  { name: "SignageHQ Website",      url: "https://signagehq.com.au/" },
  { name: "0508TempFence Website",  url: "https://www.0508tempfence.co.nz/" }
];

const forms = [
  {
    name: "Temp Fence Auto Quote",
    url: "https://www.temporaryfence.com.au/get-a-quote/",
    keyword: "First Name"
  },
  {
    name: "Dunnys Auto Quote",
    url: "https://hireportabletoilets.com.au/instant-quote/",
    keyword: "quote"
  }
];

const state = {};
const formState = {};

function formatDateTime() {
  const d = new Date();
  return d.toLocaleDateString('en-AU', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function formatTime() {
  const d = new Date();
  return d.toLocaleTimeString('en-AU', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

function renderForms() {
  const list = document.getElementById('forms-list');
  list.innerHTML = forms.map((f, i) => {
    const st = formState[i] || 'checking';
    const label = st === 'checking' ? 'Checking...' : st === 'ok' ? 'Form found' : 'Form missing';
    const rt = formState['rt_' + i] ? formState['rt_' + i] + 'ms' : '';
    return `
      <div class="site-row ${st}">
        <div class="site-left">
          <div class="status-dot ${st}"></div>
          <div>
            <div class="site-name">${f.name}</div>
            <div class="site-url">${f.url}</div>
          </div>
        </div>
        <div class="site-right">
          <div class="status-badge ${st}">${label}</div>
          ${rt ? `<div class="response-time">${rt}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

async function checkForm(i) {
  const t0 = Date.now();
  try {
    const resp = await fetch(forms[i].url, { mode: 'no-cors', cache: 'no-cache', signal: AbortSignal.timeout(10000) });
    formState[i] = 'ok';
    formState['rt_' + i] = Date.now() - t0;
  } catch {
    formState[i] = 'error';
  }
  renderForms();
  updateSummary();
}


  const list = document.getElementById('sites-list');
  list.innerHTML = sites.map((s, i) => {
    const st = state[i] || 'checking';
    const label = st === 'checking' ? 'Checking...' : st === 'ok' ? 'Online' : 'Offline';
    const rt = state['rt_' + i] ? state['rt_' + i] + 'ms' : '';
    return `
      <div class="site-row ${st}">
        <div class="site-left">
          <div class="status-dot ${st}"></div>
          <div>
            <div class="site-name">${s.name}</div>
            <div class="site-url">${s.url}</div>
          </div>
        </div>
        <div class="site-right">
          <div class="status-badge ${st}">${label}</div>
          ${rt ? `<div class="response-time">${rt}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

function updateSummary() {
  const siteVals = Object.keys(state).filter(k => !k.startsWith('rt_')).map(k => state[k]);
  const formVals = Object.keys(formState).filter(k => !k.startsWith('rt_')).map(k => formState[k]);
  const allVals = [...siteVals, ...formVals];
  const online = allVals.filter(v => v === 'ok').length;
  const offline = allVals.filter(v => v === 'error').length;
  document.getElementById('online-val').textContent = online || '—';
  document.getElementById('offline-val').textContent = offline || '—';
}

async function checkSite(i) {
  const t0 = Date.now();
  try {
    await fetch(sites[i].url, { method: 'HEAD', mode: 'no-cors', cache: 'no-cache', signal: AbortSignal.timeout(8000) });
    state[i] = 'ok';
    state['rt_' + i] = Date.now() - t0;
  } catch {
    state[i] = 'error';
  }
  renderList();
  updateSummary();
}

async function runChecks() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.classList.add('spinning');

  sites.forEach((_, i) => { delete state[i]; delete state['rt_' + i]; });
  forms.forEach((_, i) => { delete formState[i]; delete formState['rt_' + i]; });
  renderList();
  renderForms();
  document.getElementById('online-val').textContent = '—';
  document.getElementById('offline-val').textContent = '—';
  document.getElementById('last-checked').textContent = 'Checking...';

  await Promise.all([
    ...sites.map((_, i) => checkSite(i)),
    ...forms.map((_, i) => checkForm(i))
  ]);

  document.getElementById('last-checked').textContent = 'Last checked ' + formatTime();
  btn.disabled = false;
  btn.classList.remove('spinning');
}

document.getElementById('page-date').textContent = formatDateTime();
renderForms();
runChecks();
</script>
</body>
</html>
